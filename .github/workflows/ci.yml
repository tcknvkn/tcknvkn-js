name: CI

on:
  push:
    branches:
      - release
    tags:
      - "v*"
  pull_request:
    branches:
      - release

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --include=dev
      - run: npm test
      - run: npm run build

  verify-tag-on-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Tag commit release dalında mı kontrol et
        run: |
          git fetch origin release --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/release"; then
            echo "Tag, release dalındaki commit üzerinde."
          else
            echo "Tag yalnızca release dalındaki commit üzerinden oluşturulmalıdır."
            exit 1
          fi

  publish-beta:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && (contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha'))
    needs:
      - test-and-build
      - verify-tag-on-release
    runs-on: ubuntu-latest
    environment: npm-beta
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci --include=dev
      - run: npm i -g npm@^11.10.0
      - run: npm test
      - run: npm run build
      - run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-stable:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')
    needs:
      - test-and-build
      - verify-tag-on-release
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci --include=dev
      - run: npm i -g npm@^11.10.0
      - run: npm test
      - run: npm run build
      - run: npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-beta:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && (contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha'))
    needs:
      - publish-beta
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: GitHub release oluştur (beta)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true

  release-stable:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')
    needs:
      - publish-stable
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: GitHub release oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
